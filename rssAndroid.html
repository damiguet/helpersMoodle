<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Android Developers News</title>

<style>

body {
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f7fa;
    margin:0;
    padding:15px;
}


.container {
    max-width:900px;
    margin:auto;
}


.header {

    background:#3ddc84;
    color:white;
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:15px;

}


.header h2 {
    margin:0;
}


/* SLIDER */

.slider {

    position:relative;
    overflow:hidden;

}


.slide {

    display:none;

}


.slide.active {

    display:block;

}



.card {

    background:white;
    border-radius:12px;
    padding:18px;

    box-shadow:
    0 2px 8px rgba(0,0,0,.12);

}



.thumb {

    width:100%;
    height:230px;

    object-fit:cover;

    border-radius:10px;

    margin-bottom:15px;

}



.title {

    color:#1976d2;

    font-size:20px;

    font-weight:bold;

    text-decoration:none;

}



.date {

    color:#777;

    font-size:13px;

    margin:8px 0;

}



.description {

    line-height:1.5;

    color:#444;

}




/* BOTONES */

.controls {

    text-align:center;

    margin-top:12px;

}



button {

    background:#3ddc84;

    border:0;

    color:white;

    padding:8px 15px;

    border-radius:20px;

    cursor:pointer;

    margin:0 5px;

}



button:hover {

    background:#28b76b;

}


.loading {

    text-align:center;

    padding:30px;

}


</style>


</head>


<body>


<div class="container">


<div class="header">

<h2>📱 Android Developers</h2>

Últimas noticias

</div>



<div id="slider" class="slider loading">

Cargando noticias...

</div>



<div class="controls">

<button onclick="prev()">⬅</button>

<button onclick="next()">➡</button>

</div>



</div>



<script>


const rss =

"https://api.rss2json.com/v1/api.json?rss_url=" +

encodeURIComponent(

"https://android-developers.blogspot.com/atom.xml"

);



let actual = 0;

let slides = [];



fetch(rss)



.then(r=>r.json())



.then(data=>{


let html="";


data.items.slice(0,8).forEach(item=>{


let imagen="";


let img=item.description.match(/<img[^>]+src="([^">]+)"/);



if(img){

imagen=

`<img class="thumb" src="${img[1]}">`;

}




let texto=item.description

.replace(/<[^>]*>/g,'')

.replace(/&nbsp;/g,' ')

.trim()

.substring(0,220);




html += `



<div class="slide">


<div class="card">


${imagen}



<a class="title"

href="${item.link}"

target="_blank">

${item.title}

</a>



<div class="date">

📅 ${new Date(item.pubDate)

.toLocaleDateString("es-ES")}

</div>



<div class="description">

${texto}...

</div>



</div>


</div>



`;



});



document.getElementById("slider").innerHTML=html;



slides=document.querySelectorAll(".slide");


mostrar(0);



// automático

setInterval(()=>{

next();

},5000);



});





function mostrar(n){


slides.forEach(s=>s.classList.remove("active"));


slides[n].classList.add("active");


}



function next(){


if(!slides.length)return;


actual++;


if(actual>=slides.length)

actual=0;



mostrar(actual);


}



function prev(){


if(!slides.length)return;


actual--;


if(actual<0)

actual=slides.length-1;



mostrar(actual);


}



</script>


</body>

</html>
